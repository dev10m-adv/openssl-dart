name: openssl
description: OpenSSL 3.5 libcrypto for Dart via FFI and Native Assets. Raw C API bindings (no libssl/TLS).
version: 1.1.1
repository: https://github.com/LucazzP/openssl_dart

environment:
  sdk: ^3.10.1

platforms:
  android:
  ios:
  linux:
  macos:
  windows:

dependencies:
  hooks: ^1.0.0
  code_assets: ^1.0.0
  logging: ^1.3.0
  ffi: ^2.1.5
  native_toolchain_c: ^0.17.4

dev_dependencies:
  ffigen: ^20.1.1
  lints: ^6.0.0
  test: ^1.29.0
