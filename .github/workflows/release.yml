name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y perl make curl

      - name: Full repo health check
        env:
          NIX_OPENSSL_SKIP_NATIVE_HOOK: '1'
          OPENSSL_SKIP_NATIVE_HOOK: '1'
        run: |
          TAG="openssl-$(tr -d '\r\n' < native/src/VERSION)"
          git -C native/third_party/openssl fetch --depth=1 origin "refs/tags/${TAG}:refs/tags/${TAG}"
          dart pub get --no-example
          dart run tool/check_repo.dart --allow-partial

      - name: Analyze and test
        env:
          NIX_OPENSSL_SKIP_NATIVE_HOOK: '1'
          OPENSSL_SKIP_NATIVE_HOOK: '1'
        run: |
          dart pub get --no-example
          dart analyze
          dart test

      - name: Pub publish dry run
        run: dart pub publish --dry-run

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --title "openssl $VERSION" \
            --notes-file CHANGELOG.md
