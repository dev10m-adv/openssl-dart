name: OpenSSL release check

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check-releases:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compare with latest OpenSSL release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          CURRENT="$(tr -d '\r\n' < native/src/VERSION)"
          LATEST="$(curl -fsSL https://api.github.com/repos/openssl/openssl/releases/latest | jq -r '.tag_name' | sed 's/^openssl-//')"
          echo "Current pin: $CURRENT"
          echo "Latest release: $LATEST"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "Up to date."
            exit 0
          fi
          TITLE="OpenSSL bump available: $LATEST (pinned $CURRENT)"
          BODY=$(cat <<EOF
          A newer OpenSSL release was detected.

          - **Pinned:** \`$CURRENT\` ([native/src/VERSION](native/src/VERSION))
          - **Latest:** \`$LATEST\` ([openssl/openssl releases](https://github.com/openssl/openssl/releases))

          ## Bump checklist
          - [ ] Update \`native/src/VERSION\`
          - [ ] \`git submodule update --remote\` → tag \`openssl-$LATEST\`
          - [ ] \`dart run tool/sync_manifest.dart\`
          - [ ] \`dart run tool/ffigen.dart\` (if headers changed)
          - [ ] Run prebuilts workflow / merge PR
          - [ ] Remove old \`native/prebuilt/$CURRENT/\` if no longer needed
          EOF
          )
          EXISTING="$(gh issue list --search "$TITLE in:title" --state open --json number --jq '.[0].number' || true)"
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Issue #$EXISTING already open."
            exit 0
          fi
          gh issue create --title "$TITLE" --body "$BODY"
